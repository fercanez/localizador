# Visor de localización catastral - localizacion.geomexicali.info
# DocumentRoot confirmado en servidor: /var/www/html/localizacion

<VirtualHost *:80>
    ServerName localizacion.geomexicali.info
    DocumentRoot /var/www/html/localizacion

    <Directory /var/www/html/localizacion>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/localizacion-error.log
    CustomLog ${APACHE_LOG_DIR}/localizacion-access.log combined

    # Activar después de validar HTTPS:
    # RewriteEngine On
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName localizacion.geomexicali.info
    DocumentRoot /var/www/html/localizacion

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/www.geomexicali.info/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/www.geomexicali.info/privkey.pem

    <Directory /var/www/html/localizacion>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/localizacion-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/localizacion-ssl-access.log combined
</VirtualHost>
